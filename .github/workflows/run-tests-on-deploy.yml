# Ejecuta Cypress cuando otro repositorio dispara este workflow (repository_dispatch)
# y publica el reporte HTML (Mochawesome) en Vercel.
#
# Secrets en ESTE repo (Settings → Secrets and variables → Actions):
#   KLAZIFY_API_KEY      — API key de Klazify
#   VERCEL_TOKEN         — https://vercel.com/account/tokens (obligatorio para deploy desde CI)
#   VERCEL_ORG_ID        — Vercel → Team Settings → General (recomendado)
#   VERCEL_PROJECT_ID    — Vercel → Project → Settings → General (recomendado)
#
# Nota: conectar Vercel al repo en el dashboard NO crea VERCEL_TOKEN en GitHub.
#       Esa integración despliega pushes al repo; este workflow sube vercel-dist generado en CI.
#
#   SLACK_WEBHOOK_URL   — (opcional) notificación con link al reporte
#
# En el repo fuente (ej. klazify), workflow "Trigger Remote Cypress Tests":
#   repository: ${{ secrets.CYPRESS_TESTS_OWNER }}/${{ secrets.CYPRESS_TESTS_REPO }}
# Ver: examples/trigger-from-source-repo.yml
#
# Secrets repo FUENTE:
#   CROSS_REPO_DISPATCH_TOKEN, CYPRESS_TESTS_OWNER, CYPRESS_TESTS_REPO

name: Klazify API — Cypress report

on:
  repository_dispatch:
    types: [deploy_trigger, deploy]
  workflow_dispatch:
    inputs:
      note:
        description: Nota opcional (solo informativa)
        required: false
        default: ''

concurrency:
  group: klazify-cypress-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cypress-report:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Clean previous results
        run: rm -rf cypress/results vercel-dist && mkdir -p cypress/results vercel-dist

      - name: Run Cypress tests (Mochawesome)
        id: cypress
        continue-on-error: true
        env:
          KLAZIFY_API_KEY: ${{ secrets.KLAZIFY_API_KEY }}
        run: npm run test:report

      - name: Merge Mochawesome reports
        if: always()
        run: |
          if ls cypress/results/mochawesome*.json 1> /dev/null 2>&1; then
            npm run report:merge
          else
            echo '{"stats":{"tests":0,"passes":0,"failures":0,"pending":0,"skipped":0},"results":[]}' > cypress/results/mochawesome-final.json
          fi

      - name: Generate HTML report
        if: always()
        env:
          SOURCE_REPO: ${{ github.event.client_payload.source_repository || 'manual' }}
          SOURCE_BRANCH: ${{ github.event.client_payload.source_branch || github.ref_name }}
          SOURCE_SHA: ${{ github.event.client_payload.source_sha || github.sha }}
          SOURCE_ACTOR: ${{ github.event.client_payload.source_actor || github.actor }}
          SOURCE_RUN_URL: ${{ github.event.client_payload.source_run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          if [ -s cypress/results/mochawesome-final.json ]; then
            npm run report:html
          else
            cat > vercel-dist/index.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
            <head><meta charset="utf-8"><title>Klazify API Tests</title></head>
            <body>
              <h1>No test results found</h1>
              <p>Source: ${SOURCE_REPO} @ ${SOURCE_BRANCH}</p>
              <p>SHA: ${SOURCE_SHA}</p>
              <p>Triggered by: ${SOURCE_ACTOR}</p>
              <p><a href="${SOURCE_RUN_URL}">GitHub Actions run</a></p>
            </body>
          </html>
          EOF
          fi

          cp vercel.json vercel-dist/vercel.json

          cat > vercel-dist/meta.json <<EOF
          {
            "source_repository": "${SOURCE_REPO}",
            "source_branch": "${SOURCE_BRANCH}",
            "source_sha": "${SOURCE_SHA}",
            "source_actor": "${SOURCE_ACTOR}",
            "source_run_url": "${SOURCE_RUN_URL}",
            "workflow_run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Deploy report to Vercel
        if: always()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN no está configurado en GitHub Actions."
            echo ""
            echo "Conectar Vercel al repositorio en el dashboard NO crea este secret."
            echo "Pasos:"
            echo "  1. Vercel → Account Settings → Tokens → Create"
            echo "  2. GitHub → Settings → Secrets and variables → Actions"
            echo "  3. New repository secret → Name: VERCEL_TOKEN"
            echo ""
            echo "Opcional (proyecto ya conectado en Vercel):"
            echo "  VERCEL_ORG_ID     → Team Settings → General"
            echo "  VERCEL_PROJECT_ID → Project Settings → General"
            exit 1
          fi

          DEPLOY_ARGS=(--prod --token="$VERCEL_TOKEN" --cwd=vercel-dist --yes)

          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "Deploy al proyecto Vercel vinculado."
            export VERCEL_ORG_ID
            export VERCEL_PROJECT_ID
          else
            echo "::warning::VERCEL_ORG_ID o VERCEL_PROJECT_ID no configurados. Deploy por nombre: klazify-api-tests"
            DEPLOY_ARGS+=(--name klazify-api-tests)
          fi

          npx vercel deploy "${DEPLOY_ARGS[@]}"

      - name: Notify Slack (optional)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CYPRESS_OUTCOME: ${{ steps.cypress.outcome }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping."
            exit 0
          fi

          REPORT_URL="https://klazify-api-tests.vercel.app/index.html"
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Klazify Cypress finished (${CYPRESS_OUTCOME}). Report: ${REPORT_URL}\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Fail workflow if Cypress failed
        if: steps.cypress.outcome == 'failure'
        run: exit 1
